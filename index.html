<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属生理期记录器</title>
    <style>
        :root {
            --primary-color: #d81b60;
            --primary-light: #fce4ec;
            --primary-hover: #c2185b;
            --text-main: #333;
            --text-muted: #666;
            --bg-color: #fff0f5;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.08);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--primary-light);
            border-radius: 16px;
            display: none;
            border-left: 4px solid var(--primary-color);
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.4s ease-out forwards;
        }

        .result-item {
            margin-bottom: 12px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: bold;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 我的生理期记录器</h1>
        
        <div class="form-group">
            <label for="lastDate">最近一次来的第一天是？</label>
            <input type="date" id="lastDate" required>
        </div>

        <div class="form-group">
            <label for="cycleLength">你的平均周期是几天？ (通常为28天)</label>
            <input type="number" id="cycleLength" value="28" min="20" max="45" required>
        </div>

        <div class="form-group">
            <label for="periodLength">一般持续几天？ (通常为5天)</label>
            <input type="number" id="periodLength" value="5" min="2" max="10" required>
        </div>

        <button onclick="calculateNextPeriod()">帮我预测下一次</button>

        <div id="result" class="result-card">
            <div class="result-item">
                <div class="result-label">下一次预计开始时间</div>
                <div class="result-value" id="nextStartDate">--</div>
            </div>
            <div class="result-item">
                <div class="result-label">下一次预计结束时间</div>
                <div class="result-value" id="nextEndDate" style="font-size: 16px; color: #c2185b;">--</div>
            </div>
            <div class="result-item" style="margin-top: 15px; border-top: 1px dashed #f8bbd0; padding-top: 12px;">
                <div class="result-label">大概的易孕期（仅供参考）</div>
                <div class="result-value" id="fertileWindow" style="font-size: 15px; color: #880e4f;">--</div>
            </div>
        </div>
    </div>

    <script>
        // 自动将日期输入框默认设置为今天
        document.getElementById('lastDate').valueAsDate = new Date();

        function calculateNextPeriod() {
            const lastDate = document.getElementById('lastDate').value;
            const cycleLength = parseInt(document.getElementById('cycleLength').value);
            const periodLength = parseInt(document.getElementById('periodLength').value);

            if(!lastDate || !cycleLength || !periodLength) {
                alert("请填完所有的信息哦，这样我才能帮你算得准呀～");
                return;
            }

            const lastDateObj = new Date(lastDate);
            
            // 计算下一次开始的时间
            const nextStartObj = new Date(lastDateObj);
            nextStartObj.setDate(nextStartObj.getDate() + cycleLength);
            
            // 计算下一次结束的时间
            const nextEndObj = new Date(nextStartObj);
            nextEndObj.setDate(nextEndObj.getDate() + periodLength - 1); 
            
            // 格式化日期的方法
            const formatDate = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}年${m}月${d}日`;
            };

            // 估算易孕期 (基于排卵期大约在下次月经前14天，易孕期为排卵前4天到排卵后1天)
            const ovulationObj = new Date(nextStartObj);
            ovulationObj.setDate(ovulationObj.getDate() - 14);
            
            const fertileStart = new Date(ovulationObj);
            fertileStart.setDate(fertileStart.getDate() - 4);
            
            const fertileEnd = new Date(ovulationObj);
            fertileEnd.setDate(fertileEnd.getDate() + 1);

            // 更新页面数据
            document.getElementById('nextStartDate').innerText = formatDate(nextStartObj);
            document.getElementById('nextEndDate').innerText = formatDate(nextEndObj);
            document.getElementById('fertileWindow').innerText = `${formatDate(fertileStart)} 至 ${formatDate(fertileEnd)}`;

            // 显示结果卡片
            const resultCard = document.getElementById('result');
            resultCard.classList.remove('show');
            // 触发重绘以重新播放动画
            void resultCard.offsetWidth; 
            resultCard.classList.add('show');
        }
    </script>
</body>
</html>
