<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属生理期记录器</title>
    <style>
        :root {
            --primary-color: #d81b60;
            --primary-light: #fce4ec;
            --primary-hover: #c2185b;
            --text-main: #333;
            --text-muted: #666;
            --bg-color: #fff0f5;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.08);
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.1);
        }

        /* 按钮组样式 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 14px 10px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 2px solid var(--primary-color);
        }

        .btn-predict {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-predict:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-record {
            background-color: transparent;
            color: var(--primary-color);
        }

        .btn-record:hover {
            background-color: var(--primary-light);
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--primary-light);
            border-radius: 16px;
            display: none;
            border-left: 4px solid var(--primary-color);
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.4s ease-out forwards;
        }

        .result-item {
            margin-bottom: 12px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .history-section {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-header h2 {
            font-size: 16px;
            color: var(--text-main);
            margin: 0;
        }

        .clear-btn {
            flex: none;
            padding: 0;
            border: none;
            background: none;
            color: #999;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            font-weight: normal;
        }
        
        .clear-btn:hover {
            color: var(--primary-color);
            background: none;
        }

        /* 搜索框样式 */
        .search-box {
            margin-bottom: 15px;
        }
        
        .search-box input {
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 10px;
            background-color: #fafafa;
            border: 1px solid #eee;
        }
        
        .search-box input:focus {
            background-color: white;
            border-color: var(--primary-light);
            box-shadow: none;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-card {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 14px;
            position: relative;
        }

        .history-card .date {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .history-card .details {
            color: var(--text-muted);
            font-size: 12px;
        }

        .delete-item {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            flex: none;
            padding: 0;
        }

        .delete-item:hover {
            color: #f44336;
            background: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background-color: #f48fb1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 我的生理期记录器</h1>
        
        <div class="form-group">
            <label for="lastDate">记录日期的第一天是？</label>
            <input type="date" id="lastDate" required>
        </div>

        <div class="form-group">
            <label for="cycleLength">平均周期是几天？ (通常为28天)</label>
            <input type="number" id="cycleLength" value="28" min="20" max="45" required>
        </div>

        <div class="form-group">
            <label for="periodLength">一般持续几天？ (通常为5天)</label>
            <input type="number" id="periodLength" value="5" min="2" max="10" required>
        </div>

        <div class="btn-group">
            <button class="btn-predict" onclick="predictOnly()">🔮 帮我预测</button>
            <button class="btn-record" onclick="saveOnly()">📝 仅保存记录</button>
        </div>

        <div id="result" class="result-card">
            <div class="result-item">
                <div class="result-label">下一次预计开始时间</div>
                <div class="result-value" id="nextStartDate">--</div>
            </div>
            <div class="result-item">
                <div class="result-label">下一次预计结束时间</div>
                <div class="result-value" id="nextEndDate" style="font-size: 16px; color: #c2185b;">--</div>
            </div>
            <div class="result-item" style="margin-top: 15px; border-top: 1px dashed #f8bbd0; padding-top: 12px;">
                <div class="result-label">大概的易孕期（仅供参考）</div>
                <div class="result-value" id="fertileWindow" style="font-size: 15px; color: #880e4f;">--</div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h2>📝 历史记录</h2>
                <button class="clear-btn" onclick="clearAllHistory()">清空全部</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 输入年份或月份搜索 (如: 2024 或 05月)" oninput="searchHistory()">
            </div>

            <ul id="historyList" class="history-list">
                </ul>
        </div>
    </div>

    <script>
        document.getElementById('lastDate').valueAsDate = new Date();
        let periodRecords = JSON.parse(localStorage.getItem('periodRecords')) || [];

        window.onload = function() {
            renderHistory();
        };

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}年${m}月${d}日`;
        };

        function predictOnly() {
            const lastDate = document.getElementById('lastDate').value;
            const cycleLength = parseInt(document.getElementById('cycleLength').value);
            const periodLength = parseInt(document.getElementById('periodLength').value);

            if(!lastDate || !cycleLength || !periodLength) {
                alert("请填完所有的信息哦！");
                return;
            }

            const lastDateObj = new Date(lastDate);
            const nextStartObj = new Date(lastDateObj);
            nextStartObj.setDate(nextStartObj.getDate() + cycleLength);
            
            const nextEndObj = new Date(nextStartObj);
            nextEndObj.setDate(nextEndObj.getDate() + periodLength - 1); 
            
            const ovulationObj = new Date(nextStartObj);
            ovulationObj.setDate(ovulationObj.getDate() - 14);
            
            const fertileStart = new Date(ovulationObj);
            fertileStart.setDate(fertileStart.getDate() - 4);
            const fertileEnd = new Date(ovulationObj);
            fertileEnd.setDate(fertileEnd.getDate() + 1);

            document.getElementById('nextStartDate').innerText = formatDate(nextStartObj);
            document.getElementById('nextEndDate').innerText = formatDate(nextEndObj);
            document.getElementById('fertileWindow').innerText = `${formatDate(fertileStart)} 至 ${formatDate(fertileEnd)}`;

            const resultCard = document.getElementById('result');
            resultCard.classList.remove('show');
            void resultCard.offsetWidth; 
            resultCard.classList.add('show');
        }

        function saveOnly() {
            const lastDate = document.getElementById('lastDate').value;
            const cycleLength = parseInt(document.getElementById('cycleLength').value);
            const periodLength = parseInt(document.getElementById('periodLength').value);

            if(!lastDate || !cycleLength || !periodLength) {
                alert("请填完所有的信息才能保存记录哦！");
                return;
            }

            const lastDateObj = new Date(lastDate);
            
            const newRecord = {
                id: Date.now(),
                startDate: formatDate(lastDateObj),
                cycle: cycleLength,
                period: periodLength,
                timestamp: lastDateObj.getTime()
            };

            const isDuplicate = periodRecords.some(record => record.startDate === newRecord.startDate);
            if (!isDuplicate) {
                periodRecords.push(newRecord);
                periodRecords.sort((a, b) => b.timestamp - a.timestamp);
                
                localStorage.setItem('periodRecords', JSON.stringify(periodRecords));
                
                // 保存后清空搜索框并渲染全部
                document.getElementById('searchInput').value = '';
                renderHistory();
                
                const recordBtn = document.querySelector('.btn-record');
                const originalText = recordBtn.innerText;
                recordBtn.innerText = "✅ 已保存";
                setTimeout(() => {
                    recordBtn.innerText = originalText;
                }, 1500);
            } else {
                alert("这一天已经记录过啦！");
            }
        }

        // 修改为接受一个可选的记录数组进行渲染，默认渲染全部
        function renderHistory(recordsToRender = periodRecords) {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = ''; 

            if (recordsToRender.length === 0) {
                listEl.innerHTML = '<li style="text-align:center; color:#999; font-size:13px; margin-top:10px;">暂无匹配的记录~</li>';
                return;
            }

            recordsToRender.forEach(record => {
                const li = document.createElement('li');
                li.className = 'history-card';
                li.innerHTML = `
                    <div class="date">${record.startDate}</div>
                    <div class="details">周期：${record.cycle}天 | 持续：${record.period}天</div>
                    <button class="delete-item" onclick="deleteRecord(${record.id})" title="删除此条">×</button>
                `;
                listEl.appendChild(li);
            });
        }

        // 新增搜索功能
        function searchHistory() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                // 如果搜索框为空，显示全部记录
                renderHistory(periodRecords);
                return;
            }
            
            // 筛选出日期中包含搜索关键词的记录
            const filteredRecords = periodRecords.filter(record => 
                record.startDate.includes(query)
            );
            
            // 渲染筛选后的结果
            renderHistory(filteredRecords);
        }

        function deleteRecord(id) {
            if(confirm('确定要删除这条记录吗？')) {
                periodRecords = periodRecords.filter(record => record.id !== id);
                localStorage.setItem('periodRecords', JSON.stringify(periodRecords));
                
                // 删除后如果搜索框有内容，保持当前的搜索状态
                searchHistory(); 
            }
        }

        function clearAllHistory() {
            if(periodRecords.length === 0) return;
            if(confirm('确定要清空所有的历史记录吗？这个操作不可恢复哦。')) {
                periodRecords = [];
                localStorage.removeItem('periodRecords');
                document.getElementById('searchInput').value = '';
                renderHistory();
                document.getElementById('result').classList.remove('show');
            }
        }
    </script>
</body>
</html>
